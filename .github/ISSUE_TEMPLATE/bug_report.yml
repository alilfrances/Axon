name: Bug report
description: Report a reproducible Axon defect.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not report security vulnerabilities here. Use the private reporting path in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps or commands that reproduce the problem.
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Axon version, MCP host, and relevant optional tools.
      placeholder: |
        - OS:
        - Python:
        - Axon:
        - MCP host:
        - Semgrep:
        - Cortex:
    validations:
      required: true
